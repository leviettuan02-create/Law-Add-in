<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý văn bản cá nhân</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f4f4; }
        .law-item { background: white; padding: 10px; margin-bottom: 10px; border-radius: 4px; border-left: 5px solid #107c10; display: flex; justify-content: space-between; align-items: center; }
        .info { flex-grow: 1; margin-right: 20px;}
        .name { font-weight: bold; color: #2b579a; text-align: justify;}
        .sku { font-size: 12px; color: #666; }
        .actions { flex-shrink: 0; white-space: nowrap; }
        .actions button { margin-left: 5px; padding: 5px 10px; cursor: pointer; border: none; border-radius: 3px; }
        .edit-btn { background: #ffc107; }
        .del-btn { background: #dc3545; color: white; }
        /* Cửa sổ sửa (ẩn mặc định) */
        #editForm { display:none; position: fixed; top:0; left:0; right:0; bottom:0; background:white; padding:20px; z-index:100; }
        input, textarea { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <!-- Thay thế thẻ tiêu đề cũ của bạn bằng đoạn này -->
    <h2 style="
        color: #004b87; 
        font-size: 18px; 
        font-weight: bold; 
        text-transform: uppercase; 
        padding-bottom: 12px; 
        margin-top: 10px;
        margin-bottom: 20px; 
        border-bottom: 2px solid #004b87;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
        DANH SÁCH VĂN BẢN ĐÃ THÊM
    </h2>
    <div id="list"></div>

    <div id="editForm" style="display:none; position: fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: white; padding: 25px 30px; border-radius: 8px; width: 95%; max-width: 800px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); max-height: 95vh; overflow-y: auto; font-family: 'Segoe UI', sans-serif;">
            
            <h3 style="margin-top: 0; color: #2b579a; border-bottom: 2px solid #2b579a; padding-bottom: 10px; font-size: 18px; text-transform: uppercase;">
                CHỈNH SỬA VĂN BẢN
            </h3>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px 20px; margin-top: 20px;">
                
                <div>
                    <label style="font-weight: bold; font-size: 13px; color: #333;">Lĩnh vực <span style="color:red">(*)</span></label>
                    <input type="text" id="editCat" placeholder="Vd: Đất đai, Thuế..." style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; outline: none;">
                </div>
                <div>
                    <label style="font-weight: bold; font-size: 13px; color: #333;">Số ký hiệu <span style="color:red">(*)</span></label>
                    <input type="text" id="editSku" placeholder="VD: 45/2013/QH13" style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; outline: none;">
                </div>

                <div>
                    <label style="font-weight: bold; font-size: 13px; color: #333;">Ngày ban hành <span style="color:red">(*)</span></label>
                    <input type="date" id="editDate" style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; outline: none;">
                </div>
                <div>
                    <label style="font-weight: bold; font-size: 13px; color: #333;">Ngày có hiệu lực</label>
                    <input type="date" id="editEffectiveDate" style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; outline: none;">
                </div>

                <div>
                    <label style="font-weight: bold; font-size: 13px; color: #333;">Loại văn bản <span style="color:red">(*)</span></label>
                    <input type="text" id="editType" placeholder="VD: Luật, Nghị định" style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; outline: none;">
                </div>
                <div>
                    <label style="font-weight: bold; font-size: 13px; color: #333;">Cơ quan ban hành <span style="color:red">(*)</span></label>
                    <input type="text" id="editAgency" placeholder="VD: Quốc hội" style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; outline: none;">
                </div>

                <div>
                    <label style="font-weight: bold; font-size: 13px; color: #333;">Người ký</label>
                    <input type="text" id="editSigner" placeholder="Nhập họ tên người ký" style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; outline: none;">
                </div>
                <div></div> <div style="grid-column: span 2;">
                    <label style="font-weight: bold; font-size: 13px; color: #333;">Trích yếu <span style="color:red">(*)</span></label>
                    <textarea id="editName" rows="4" placeholder="Nhập nội dung trích yếu đầy đủ của văn bản..." style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: inherit; resize: vertical; outline: none;"></textarea>
                </div>

                <div style="grid-column: span 2;">
                    <label style="font-weight: bold; font-size: 13px; color: #333;">Đường dẫn (Link)</label>
                    <input type="text" id="editLink" placeholder="https://..." style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; outline: none;">
                </div>

            </div>

            <div style="display:flex; gap:15px; margin-top: 25px;">
                <button onclick="updateLaw()" style="flex:1; padding:12px; background: #107c10; color:white; border:none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px;">Lưu cập nhật</button>
                <button onclick="closeEdit()" style="flex:1; padding:12px; background: #999; color:white; border:none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px;">Hủy bỏ</button>
            </div>
        </div>
    </div>    
    
    <div id="deleteConfirmModal" style="display:none; position: fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
        <div style="background: white; padding: 20px; border-radius: 5px; text-align: center; width: 80%; max-width: 300px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
            <h4 style="margin-top: 0; color: #dc3545;">Xóa</h4>
            <p>Bạn có chắc chắn muốn xóa văn bản này không?</p>
            <div style="margin-top: 20px;">
                <button onclick="executeDelete()" style="background: #dc3545; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 3px; margin-right: 10px;">Đồng ý</button>
                <button onclick="closeDeleteModal()" style="background: #ccc; border: none; padding: 8px 15px; cursor: pointer; border-radius: 3px;">Hủy bỏ</button>
            </div>
        </div>
    </div>
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script>
        let customLaws = [];
        let editingIndex = -1;

        function render() {
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = customLaws.length === 0 ? "<p>Chưa có văn bản nào được thêm.</p>" : "";
            customLaws.forEach((law, index) => {
                listDiv.innerHTML += `
                    <div class="law-item">
                        <div class="info">
                            <div class="name">${law.name}</div>
                            <div class="sku">${law.sokyhieu} | ${law.category}</div>
                        </div>
                        <div class="actions">
                            <button class="edit-btn" onclick="openEdit(${index})">Sửa</button>
                            <button class="del-btn" onclick="deleteLaw(${index})">Xóa</button>
                        </div>
                    </div>`;
            });
        }

        function openEdit(index) {
            editingIndex = index;
            const law = customLaws[index];
            
            // Nạp dữ liệu vào 9 trường (dùng || "" để không bị hiện chữ 'undefined' nếu trống)
            document.getElementById('editCat').value = law.category || "";
            document.getElementById('editSku').value = law.sokyhieu || "";
            document.getElementById('editDate').value = law.ngaybanhanh || "";
            document.getElementById('editEffectiveDate').value = law.ngayhieuluc || "";
            document.getElementById('editType').value = law.loaivanban || "";
            document.getElementById('editAgency').value = law.coquanbanhanh || ""; 
            document.getElementById('editSigner').value = law.nguoiky || "";
            document.getElementById('editName').value = law.trichyeu || "";
            document.getElementById('editLink').value = law.link || "";

            // Bật hiển thị cửa sổ
            document.getElementById('editForm').style.display = 'flex';
        }        

        function closeEdit() { document.getElementById('editForm').style.display = 'none'; }

        function updateLaw() {
            // Cập nhật lại 9 trường thông tin vào mảng
            customLaws[editingIndex].category = document.getElementById('editCat').value;
            customLaws[editingIndex].sokyhieu = document.getElementById('editSku').value;
            customLaws[editingIndex].ngaybanhanh = document.getElementById('editDate').value;
            customLaws[editingIndex].ngayhieuluc = document.getElementById('editEffectiveDate').value;
            customLaws[editingIndex].loaivanban = document.getElementById('editType').value;
            customLaws[editingIndex].coquanbanhanh = document.getElementById('editAgency').value;
            customLaws[editingIndex].nguoiky = document.getElementById('editSigner').value;
            customLaws[editingIndex].trichyeu = document.getElementById('editName').value;
            customLaws[editingIndex].link = document.getElementById('editLink').value;
            
            // Gửi dữ liệu đã cập nhật về Taskpane
            Office.context.ui.messageParent(JSON.stringify({ action: 'refresh', data: customLaws }));
            
            // Đóng cửa sổ và tải lại danh sách
            closeEdit();
            render();
        }        

        // Biến lưu tạm vị trí văn bản đang chuẩn bị xóa
        let itemToDeleteIndex = -1;

        // 1. Hàm mở cửa sổ xác nhận khi bấm nút "Xóa" màu đỏ
        function deleteLaw(index) {
            itemToDeleteIndex = index;
            // Hiển thị khung xác nhận (dùng flex để căn giữa)
            document.getElementById('deleteConfirmModal').style.display = 'flex';
        }

        // 2. Hàm đóng cửa sổ xác nhận
        function closeDeleteModal() {
            document.getElementById('deleteConfirmModal').style.display = 'none';
            itemToDeleteIndex = -1;
        }

        // 3. Hàm thực thi việc xóa (Chạy khi người dùng bấm "Đồng ý Xóa")
        function executeDelete() {
            if (itemToDeleteIndex > -1) {
                // Xóa phần tử khỏi mảng
                customLaws.splice(itemToDeleteIndex, 1);
                
                // Gửi dữ liệu đã xóa về Taskpane
                Office.context.ui.messageParent(JSON.stringify({ action: 'refresh', data: customLaws }));
                
                // Vẽ lại danh sách và đóng khung xác nhận
                render();
                closeDeleteModal();
            }
        }

        Office.onReady(() => { 
            // 1. Đăng ký nhận gói dữ liệu từ Taskpane ném sang
            Office.context.ui.addHandlerAsync(Office.EventType.DialogParentMessageReceived, function(arg) {
                const result = JSON.parse(arg.message);
                if (result.action === 'loadData') {
                    customLaws = result.data;
                    render(); // Có dữ liệu rồi thì vẽ ra màn hình
                }
            });

            // 2. Gửi tín hiệu 'ready' báo cho Taskpane biết là Cửa sổ đã sẵn sàng nhận hàng
            Office.context.ui.messageParent(JSON.stringify({ action: 'ready' }));
        });        
    </script>
</body>
</html>
