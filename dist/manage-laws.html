<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Quản lý văn bản cá nhân</title><style>body{font-family:'Segoe UI',sans-serif;padding:20px;background:#f4f4f4}.law-item{background:#fff;padding:10px;margin-bottom:10px;border-radius:4px;border-left:5px solid #107c10;display:flex;justify-content:space-between;align-items:center}.info{flex-grow:1;margin-right:20px}.name{font-weight:700;color:#2b579a;text-align:justify}.sku{font-size:12px;color:#666}.actions{flex-shrink:0;white-space:nowrap}.actions button{margin-left:5px;padding:5px 10px;cursor:pointer;border:none;border-radius:3px}.edit-btn{background:#ffc107}.del-btn{background:#dc3545;color:#fff}#editForm{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;padding:20px;z-index:100}input,textarea{width:100%;padding:8px;margin:10px 0;border:1px solid #ccc}</style><script defer="defer" src="polyfill.js"></script></head><body><h2 style="color:#004b87;font-size:18px;font-weight:700;text-transform:uppercase;padding-bottom:12px;margin-top:10px;margin-bottom:20px;border-bottom:2px solid #004b87;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif">DANH SÁCH VĂN BẢN ĐÃ THÊM</h2><div id="list"></div><div id="editForm" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center"><div style="background:#fff;padding:25px 30px;border-radius:8px;width:95%;max-width:800px;box-shadow:0 4px 20px rgba(0,0,0,.3);max-height:95vh;overflow-y:auto;font-family:'Segoe UI',sans-serif"><h3 style="margin-top:0;color:#2b579a;border-bottom:2px solid #2b579a;padding-bottom:10px;font-size:18px;text-transform:uppercase">CHỈNH SỬA VĂN BẢN</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:15px 20px;margin-top:20px"><div><label style="font-weight:700;font-size:13px;color:#333">Lĩnh vực <span style="color:red">(*)</span></label> <input id="editCat" placeholder="Vd: Đất đai, Thuế..." style="width:100%;padding:10px;margin-top:5px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;outline:0"></div><div><label style="font-weight:700;font-size:13px;color:#333">Số ký hiệu <span style="color:red">(*)</span></label> <input id="editSku" placeholder="VD: 45/2013/QH13" style="width:100%;padding:10px;margin-top:5px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;outline:0"></div><div><label style="font-weight:700;font-size:13px;color:#333">Ngày ban hành <span style="color:red">(*)</span></label> <input type="date" id="editDate" style="width:100%;padding:10px;margin-top:5px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;outline:0"></div><div><label style="font-weight:700;font-size:13px;color:#333">Ngày có hiệu lực</label> <input type="date" id="editEffectiveDate" style="width:100%;padding:10px;margin-top:5px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;outline:0"></div><div><label style="font-weight:700;font-size:13px;color:#333">Loại văn bản <span style="color:red">(*)</span></label> <input id="editType" placeholder="VD: Luật, Nghị định" style="width:100%;padding:10px;margin-top:5px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;outline:0"></div><div><label style="font-weight:700;font-size:13px;color:#333">Cơ quan ban hành <span style="color:red">(*)</span></label> <input id="editAgency" placeholder="VD: Quốc hội" style="width:100%;padding:10px;margin-top:5px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;outline:0"></div><div><label style="font-weight:700;font-size:13px;color:#333">Người ký</label> <input id="editSigner" placeholder="Nhập họ tên người ký" style="width:100%;padding:10px;margin-top:5px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;outline:0"></div><div></div><div style="grid-column:span 2"><label style="font-weight:700;font-size:13px;color:#333">Trích yếu <span style="color:red">(*)</span></label> <textarea id="editName" rows="4" placeholder="Nhập nội dung trích yếu đầy đủ của văn bản..." style="width:100%;padding:10px;margin-top:5px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;font-family:inherit;resize:vertical;outline:0"></textarea></div><div style="grid-column:span 2"><label style="font-weight:700;font-size:13px;color:#333">Đường dẫn (Link)</label> <input id="editLink" placeholder="https://..." style="width:100%;padding:10px;margin-top:5px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;outline:0"></div></div><div style="display:flex;gap:15px;margin-top:25px"><button onclick="updateLaw()" style="flex:1;padding:12px;background:#107c10;color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:700;font-size:14px">Lưu cập nhật</button> <button onclick="closeEdit()" style="flex:1;padding:12px;background:#999;color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:700;font-size:14px">Hủy bỏ</button></div></div></div><div id="deleteConfirmModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:2000;align-items:center;justify-content:center"><div style="background:#fff;padding:20px;border-radius:5px;text-align:center;width:80%;max-width:300px;box-shadow:0 4px 10px rgba(0,0,0,.2)"><h4 style="margin-top:0;color:#dc3545">Xóa</h4><p>Bạn có chắc chắn muốn xóa văn bản này không?</p><div style="margin-top:20px"><button onclick="executeDelete()" style="background:#dc3545;color:#fff;border:none;padding:8px 15px;cursor:pointer;border-radius:3px;margin-right:10px">Đồng ý</button> <button onclick="closeDeleteModal()" style="background:#ccc;border:none;padding:8px 15px;cursor:pointer;border-radius:3px">Hủy bỏ</button></div></div></div><script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script><script>let customLaws=[],editingIndex=-1;function render(){const e=document.getElementById("list");e.innerHTML=0===customLaws.length?"<p>Chưa có văn bản nào được thêm.</p>":"",customLaws.forEach((t,n)=>{e.innerHTML+=`\n                    <div class="law-item">\n                        <div class="info">\n                            <div class="name">${t.name}</div>\n                            <div class="sku">${t.sokyhieu} | ${t.category}</div>\n                        </div>\n                        <div class="actions">\n                            <button class="edit-btn" onclick="openEdit(${n})">Sửa</button>\n                            <button class="del-btn" onclick="deleteLaw(${n})">Xóa</button>\n                        </div>\n                    </div>`})}function openEdit(e){editingIndex=e;const t=customLaws[e];document.getElementById("editCat").value=t.category||"",document.getElementById("editSku").value=t.sokyhieu||"",document.getElementById("editDate").value=t.ngaybanhanh||"",document.getElementById("editEffectiveDate").value=t.ngayhieuluc||"",document.getElementById("editType").value=t.loaivanban||"",document.getElementById("editAgency").value=t.coquanbanhanh||"",document.getElementById("editSigner").value=t.nguoiky||"",document.getElementById("editName").value=t.trichyeu||"",document.getElementById("editLink").value=t.link||"",document.getElementById("editForm").style.display="flex"}function closeEdit(){document.getElementById("editForm").style.display="none"}function updateLaw(){customLaws[editingIndex].category=document.getElementById("editCat").value,customLaws[editingIndex].sokyhieu=document.getElementById("editSku").value,customLaws[editingIndex].ngaybanhanh=document.getElementById("editDate").value,customLaws[editingIndex].ngayhieuluc=document.getElementById("editEffectiveDate").value,customLaws[editingIndex].loaivanban=document.getElementById("editType").value,customLaws[editingIndex].coquanbanhanh=document.getElementById("editAgency").value,customLaws[editingIndex].nguoiky=document.getElementById("editSigner").value,customLaws[editingIndex].trichyeu=document.getElementById("editName").value,customLaws[editingIndex].link=document.getElementById("editLink").value,Office.context.ui.messageParent(JSON.stringify({action:"refresh",data:customLaws})),closeEdit(),render()}let itemToDeleteIndex=-1;function deleteLaw(e){itemToDeleteIndex=e,document.getElementById("deleteConfirmModal").style.display="flex"}function closeDeleteModal(){document.getElementById("deleteConfirmModal").style.display="none",itemToDeleteIndex=-1}function executeDelete(){itemToDeleteIndex>-1&&(customLaws.splice(itemToDeleteIndex,1),Office.context.ui.messageParent(JSON.stringify({action:"refresh",data:customLaws})),render(),closeDeleteModal())}Office.onReady(()=>{Office.context.ui.addHandlerAsync(Office.EventType.DialogParentMessageReceived,function(e){const t=JSON.parse(e.message);"loadData"===t.action&&(customLaws=t.data,render())}),Office.context.ui.messageParent(JSON.stringify({action:"ready"}))})</script></body></html>
